body:
  text: 孝經大義序孝經類孔門之學惟曽氏得其宗曽氏之書有二曰大學曰孝經經傳章句頗亦相似學以大學為本行以孝經為先自天子至庶人一也堯典一篇大學孝經之準也自克明峻德以至親睦九族極而百姓之昭明萬邦之於變大學之序也孝之為道蓋已具於親睦九族之中矣何也一本故也自是舜以克孝而徽五典禹以致孝而叙彝倫伊尹述成湯之德一則曰立愛惟親二則曰奉先思孝人紀之修孰大乎是文武周公帥是而行備見於記禮所載上而宗廟之享下而子孫之保其為孝蔑有加焉功化之盛至使四海之內人人親其親長其長一鱗毛一芽甲之微無不得所嗚呼二帝三王之教可謂大矣孝經一書即其遺法也世入春秋皇綱解紐孔子傷之三復昔者明王孝治之言思之深望之切矣誠使天子公卿躬行於上凡禮樂刑政之具一是以孝為本則斯道也固天性之自然人心之固有一轉移間王道顧不易易乎惜也徒託之空言而僅見於門人記録之書也書存而道可舉雖不能行之一時猶可詔之來世今此經之可考者不過漢藝文志而已而其篇次則顔注古文二十二章孔壁所藏本也今文一十八章河間王所得顔芝本而劉向之所參較者也要之出於諸儒傅㑹皆非曽氏門人所記舊文矣唐𤣥宗開元敕議意非不美而司馬貞淺學陋識并以閨門一章去之卒啓𤣥宗無禮無度之禍而其所製序文至以禮為外飾之所資仁義為後來之漸有不知所謂因心之孝者果何所因而又何自而萌乎學之不講德之不修一至於此我徽國文公特起南夏平生精力用工易四書為多至此書則僅成刋誤一編注釋大義猶有所未及噫人子不可斯須忘孝則此經為天子至庶人一日不可無之書章句已明而文義猶闕顧非一大缺事乎蓋嘗有志彚集諸家傳注以明一經而未果一日余友胡庭芳挈其高弟董真卿訪豫雲谷山中手攜孝經大義一書取而閲之則其家君深山先生董君季亨父所輯也其書為初學設故其詞皆明白而切實熟玩之則義味精深又有非淺見謏聞所能窺者族兄明仲敬為刋之書孰以廣其傳此豈惟學者修身齊家之要而有國有天下者亦豈能外是而他有化民成俗之道哉噫滕五十里國耳其君一用之至於四方草偃風動一時行事猶班班有三代之風學問之功用固如此晉武魏文亦天資之美者惜諸臣無識不能有以啓道而克大之悠悠蓋壤此經之廢蓋千五百餘年人心秉彜極天罔墜豈無有能講而行之者誠有以二帝三王之心為心則必以二帝三王之教為教矣仁人心也學所以求仁而孝則行仁之本也語曰如有王者必世而後仁愚何幸身親見之歲在乙巳陽復之月前進士武夷熊禾序時大德之九年也欽定四庫全書孝經大義提要臣等謹按孝經大義一卷宋董鼎撰鼎有尚書輯録纂注己著録初朱子作孝經刋誤但為釐定經傳刪削字句而未及為之訓釋鼎乃因朱子改本為之詮解凡改本圈記之字悉為芟除改本辨正之語仍存于各章之末所謂右傳之幾章釋某義者一一順文衍說無所出入第十三章十四章所謂不解經而别發一義者亦即以經外之義說之無所辨詰惟增注今文異同為鼎所加耳其注稍參以方言如云今有一箇道理又云至此方言出一孝字之類略如語録之例其敷衍語氣則全為口義之體雖遣詞未免稍冗而發揮明暢頗能反覆以盡其意于初學亦不為無益也前有熊禾序蓋大德九年鼎子真卿從胡一桂訪禾于雲谷山中以此書質禾禾因屬其族兄熊敬刋行而自序其首序稱朱子為桓桓文公案書曰朂哉夫子尚桓桓孔傳曰桓桓武貌爾雅曰桓桓烈烈威也均與著書明道無關頗為杜撰又文公字跳行示敬而孔子曽子字乃均不跳行亦殊顛倒以原本所有姑仍其舊録之焉乾隆四十年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
